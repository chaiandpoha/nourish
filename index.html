
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0f0f0f" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Nourish" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <title>Nourish</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Reload page when a new service worker activates so the new bundle loads cleanly.
      // Without this, the old page keeps running with old JS chunks that the new SW no longer caches.
      if ('serviceWorker' in navigator) {
        var _swReloading = false;
        navigator.serviceWorker.addEventListener('controllerchange', function() {
          if (!_swReloading) { _swReloading = true; window.location.reload(); }
        });
      }
      window.onerror = function(msg, src, line, col, err) {
        var r = document.getElementById('root');
        if (r && !r.innerHTML.trim()) {
          r.innerHTML = '<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100dvh;background:#0f0f0f;color:#fff;gap:12px;padding:24px;text-align:center;font-family:sans-serif"><div style="font-size:48px">⚠️</div><p style="font-size:16px;margin:0">Script error</p><p style="font-size:12px;color:#888;margin:0;word-break:break-all">' + (msg || 'Unknown error') + '</p><button onclick="window.location.reload()" style="margin-top:8px;padding:10px 20px;background:#333;border:none;border-radius:8px;color:#fff;cursor:pointer">Reload</button></div>';
        }
      };
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
